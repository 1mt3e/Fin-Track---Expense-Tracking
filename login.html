<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to FinTrack to manage and track your personal expenses." />
  <title>FinTrack — Log In</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- ===== Theme & Language Toggle (floating) ===== -->
  <div class="auth-theme-toggle" style="display: flex; align-items: center; gap: 8px;">
    <select class="form-select" id="langSelect" style="width: auto; padding: 0.35rem 2.25rem 0.35rem 0.75rem; font-size: 0.75rem; height: 38px; border-radius: var(--radius-md); background-color: var(--color-white); border-color: var(--color-border); cursor: pointer; color: var(--color-text);">
      <option value="en">English</option>
      <option value="vi">Tiếng Việt</option>
    </select>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <!-- ===== Auth Container ===== -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-brand">FinTrack</h1>
        <p class="auth-subtitle" data-i18n="auth_welcome_title">Welcome back! Please enter your details.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email" data-i18n="auth_email_label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
          <div class="form-error" id="emailError" data-i18n="auth_email_error">Please enter a valid email.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password" data-i18n="auth_password_label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required />
          <div class="form-error" id="passwordError" data-i18n="auth_password_error">Password is required.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-auth" data-i18n="auth_login_btn">Log In</button>
      </form>

      <div class="auth-footer">
        <p><span data-i18n="auth_no_account">Don't have an account?</span> <a href="signup.html" data-i18n="auth_signup_link">Sign up for free</a></p>
      </div>
    </div>
  </div>

  <!-- ===== Toast Container ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="translations.js"></script>
  <script src="auth.js"></script>
</body>
</html>
