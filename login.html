<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to FinTrack to manage and track your personal expenses." />
  <title>FinTrack — Log In</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- ===== Theme Toggle (floating) ===== -->
  <div class="auth-theme-toggle">
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <!-- ===== Auth Container ===== -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-brand">FinTrack</h1>
        <p class="auth-subtitle">Welcome back! Please enter your details.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
          <div class="form-error" id="emailError">Please enter a valid email.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required />
          <div class="form-error" id="passwordError">Password is required.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-auth">Log In</button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign up for free</a></p>
      </div>
    </div>
  </div>

  <!-- ===== Toast Container ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="auth.js"></script>
</body>
</html>
