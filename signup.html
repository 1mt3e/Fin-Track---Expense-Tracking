<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign up to FinTrack to start tracking your personal expenses." />
  <title>FinTrack — Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- ===== Theme Toggle (floating) ===== -->
  <div class="auth-theme-toggle">
    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <!-- ===== Auth Container ===== -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-brand">FinTrack</h1>
        <p class="auth-subtitle">Create an account to start tracking expenses.</p>
      </div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
          <div class="form-error" id="emailError">Please enter a valid email.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Min. 6 characters" required />
          <div class="form-error" id="passwordError">Password must be at least 6 characters.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required />
          <div class="form-error" id="confirmPasswordError">Passwords do not match.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-auth">Sign Up</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Log in here</a></p>
      </div>
    </div>
  </div>

  <!-- ===== Toast Container ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="auth.js"></script>
</body>
</html>
